<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap New Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .glass-hover:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }
    .url-row:hover { background: rgba(255,255,255,0.05); }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 text-white">

  <div class="max-w-5xl mx-auto px-4 py-8 sm:py-12">

    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center gap-2 mb-3">
        <i data-lucide="radar" class="w-8 h-8 text-purple-400"></i>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">Sitemap New Tracker</h1>
      </div>
      <p class="text-slate-400 text-sm">Daily monitoring of new sites added to theporndude.com</p>
    </header>

    <!-- Stats Bar -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
      <div class="glass rounded-xl p-4 text-center">
        <i data-lucide="database" class="w-5 h-5 mx-auto mb-1 text-blue-400"></i>
        <div id="stat-total" class="text-2xl font-bold">—</div>
        <div class="text-xs text-slate-400">Total Tracked</div>
      </div>
      <div class="glass rounded-xl p-4 text-center">
        <i data-lucide="sparkles" class="w-5 h-5 mx-auto mb-1 text-green-400"></i>
        <div id="stat-today" class="text-2xl font-bold">—</div>
        <div class="text-xs text-slate-400">Latest New</div>
      </div>
      <div class="glass rounded-xl p-4 text-center">
        <i data-lucide="calendar" class="w-5 h-5 mx-auto mb-1 text-amber-400"></i>
        <div id="stat-updated" class="text-2xl font-bold text-base">—</div>
        <div class="text-xs text-slate-400">Last Updated</div>
      </div>
      <div class="glass rounded-xl p-4 text-center">
        <i data-lucide="layers" class="w-5 h-5 mx-auto mb-1 text-purple-400"></i>
        <div id="stat-days" class="text-2xl font-bold">—</div>
        <div class="text-xs text-slate-400">Days Tracked</div>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="glass rounded-xl p-4 mb-8 flex flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input id="search" type="text" placeholder="Search URLs..."
          class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition">
      </div>
      <select id="category-filter"
        class="bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500/50 transition appearance-none cursor-pointer">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Entries Container -->
    <div id="entries"></div>

    <!-- Empty State -->
    <div id="empty" class="hidden text-center py-20">
      <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-slate-600"></i>
      <p class="text-slate-500 text-lg">No data yet</p>
      <p class="text-slate-600 text-sm mt-1">Run the tracker to start monitoring</p>
    </div>

    <!-- Loading State -->
    <div id="loading" class="text-center py-20">
      <i data-lucide="loader-2" class="w-8 h-8 mx-auto mb-3 text-purple-400 animate-spin"></i>
      <p class="text-slate-400">Loading data...</p>
    </div>

  </div>

<script>
const COLLAPSE_THRESHOLD = 50;
let allData = null;

async function init() {
  try {
    const res = await fetch("./history.json");
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
    document.getElementById("loading").classList.add("hidden");

    if (!allData.entries || allData.entries.length === 0) {
      document.getElementById("empty").classList.remove("hidden");
      lucide.createIcons();
      return;
    }

    renderStats(allData);
    populateCategories(allData.entries);
    renderEntries(allData.entries);
    setupSearch();
    lucide.createIcons();
  } catch (e) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("empty").classList.remove("hidden");
    lucide.createIcons();
  }
}

function renderStats(data) {
  document.getElementById("stat-total").textContent = data.totalTracked.toLocaleString();
  document.getElementById("stat-today").textContent = data.entries[0]?.count.toLocaleString() || "0";
  document.getElementById("stat-updated").textContent = data.lastUpdated || "—";
  document.getElementById("stat-days").textContent = data.entries.length.toString();
}

function populateCategories(entries) {
  const cats = new Set();
  for (const entry of entries) {
    for (const u of entry.urls) {
      if (u.category) cats.add(u.category);
    }
  }
  const select = document.getElementById("category-filter");
  const sorted = [...cats].sort();
  for (const cat of sorted) {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat.replace(/-/g, " ");
    select.appendChild(opt);
  }
}

function renderEntries(entries, searchTerm = "", category = "") {
  const container = document.getElementById("entries");
  container.innerHTML = "";

  const filtered = filterEntries(entries, searchTerm, category);

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="text-center py-12">
        <p class="text-slate-500">No matching results</p>
      </div>`;
    return;
  }

  for (const entry of filtered) {
    const card = document.createElement("div");
    card.className = "glass rounded-2xl p-5 mb-4 fade-in";

    const collapsed = entry.urls.length > COLLAPSE_THRESHOLD;
    const displayUrls = collapsed ? entry.urls.slice(0, COLLAPSE_THRESHOLD) : entry.urls;
    const id = "card-" + entry.date;

    card.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <i data-lucide="calendar-days" class="w-4 h-4 text-purple-400"></i>
          <span class="font-semibold">${entry.date}</span>
        </div>
        <span class="bg-purple-500/20 text-purple-300 text-xs font-medium px-2.5 py-1 rounded-full">
          +${entry.count} new
        </span>
      </div>
      <div id="${id}" class="space-y-1">
        ${displayUrls.map(u => urlRow(u)).join("")}
      </div>
      ${collapsed ? `
        <button onclick="expandCard('${id}', this, ${JSON.stringify(entry.urls.slice(COLLAPSE_THRESHOLD)).replace(/"/g, '&quot;')})"
          class="mt-3 text-sm text-purple-400 hover:text-purple-300 transition flex items-center gap-1">
          <i data-lucide="chevron-down" class="w-4 h-4"></i>
          Show ${entry.urls.length - COLLAPSE_THRESHOLD} more
        </button>
      ` : ""}
    `;
    container.appendChild(card);
  }
  lucide.createIcons();
}

function urlRow(u) {
  const display = u.url.replace(/^https?:\/\//, "").replace(/\/$/, "");
  const cat = u.category
    ? `<span class="shrink-0 bg-white/10 text-slate-300 text-[10px] px-1.5 py-0.5 rounded">${u.category.replace(/-/g, " ")}</span>`
    : "";
  return `
    <a href="${u.url}" target="_blank" rel="noopener"
       class="url-row flex items-center gap-2 px-3 py-2 rounded-lg transition group">
      <i data-lucide="external-link" class="w-3.5 h-3.5 text-slate-500 group-hover:text-purple-400 shrink-0 transition"></i>
      <span class="truncate text-sm text-slate-300 group-hover:text-white transition" title="${u.url}">${display}</span>
      ${cat}
    </a>`;
}

window.expandCard = function(id, btn, remaining) {
  const container = document.getElementById(id);
  for (const u of remaining) {
    container.insertAdjacentHTML("beforeend", urlRow(u));
  }
  btn.remove();
  lucide.createIcons();
};

function filterEntries(entries, search, category) {
  const term = search.toLowerCase().trim();
  const result = [];
  for (const entry of entries) {
    let filtered = entry.urls;
    if (category) filtered = filtered.filter(u => u.category === category);
    if (term) filtered = filtered.filter(u => u.url.toLowerCase().includes(term));
    if (filtered.length > 0) {
      result.push({ ...entry, urls: filtered, count: filtered.length });
    }
  }
  return result;
}

function setupSearch() {
  const searchInput = document.getElementById("search");
  const catSelect = document.getElementById("category-filter");
  let debounce;

  function doFilter() {
    renderEntries(allData.entries, searchInput.value, catSelect.value);
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(doFilter, 200);
  });
  catSelect.addEventListener("change", doFilter);
}

init();
</script>
</body>
</html>
