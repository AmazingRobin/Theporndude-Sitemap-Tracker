<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap 新增追踪器</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    .glass {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .trow:hover { background: rgba(255,255,255,0.05); }
    .cat-pill { background: rgba(139,92,246,0.18); color: #c4b5fd; }
    .thumb-img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body class="h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 text-white flex flex-col">

  <div class="max-w-7xl w-full mx-auto px-4 pt-5 pb-3 flex flex-col h-screen overflow-hidden">

    <!-- 头部 -->
    <header class="text-center mb-3 shrink-0">
      <div class="inline-flex items-center gap-2 mb-1">
        <i data-lucide="radar" class="w-7 h-7 text-purple-400"></i>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Sitemap 新增追踪器</h1>
      </div>
      <p class="text-slate-400 text-sm">每日监控 theporndude.com 新增站点</p>
    </header>

    <!-- 统计栏 -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3 shrink-0">
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="database" class="w-4 h-4 mx-auto mb-0.5 text-blue-400"></i>
        <div id="stat-total" class="text-lg font-bold">—</div>
        <div class="text-[11px] text-slate-400">累计追踪</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="sparkles" class="w-4 h-4 mx-auto mb-0.5 text-green-400"></i>
        <div id="stat-today" class="text-lg font-bold">—</div>
        <div class="text-[11px] text-slate-400">最近新增</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="calendar" class="w-4 h-4 mx-auto mb-0.5 text-amber-400"></i>
        <div id="stat-updated" class="text-lg font-bold text-sm leading-7">—</div>
        <div class="text-[11px] text-slate-400">最后更新</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="layers" class="w-4 h-4 mx-auto mb-0.5 text-purple-400"></i>
        <div id="stat-days" class="text-lg font-bold">—</div>
        <div class="text-[11px] text-slate-400">追踪天数</div>
      </div>
    </div>

    <!-- 搜索与筛选 -->
    <div class="glass rounded-xl p-2.5 mb-3 flex flex-col sm:flex-row gap-2 shrink-0">
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input id="search" type="text" placeholder="搜索站点名称或 URL..."
          class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition">
      </div>
      <select id="category-filter"
        class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500/50 transition cursor-pointer min-w-[130px]">
        <option value="">全部分类</option>
      </select>
      <div id="result-count" class="text-xs text-slate-500 self-center px-2 whitespace-nowrap"></div>
    </div>

    <!-- 表格区域 -->
    <div class="flex-1 min-h-0 flex flex-col glass rounded-xl overflow-hidden">
      <!-- 表头 -->
      <div class="shrink-0 flex items-center px-4 py-2 text-xs font-medium text-slate-400 uppercase tracking-wider border-b border-white/8 bg-white/3">
        <div class="w-[50px] shrink-0 text-center">#</div>
        <div class="w-[52px] shrink-0">图标</div>
        <div class="w-[200px] shrink-0">站点名称</div>
        <div class="flex-1 min-w-0">简介</div>
        <div class="w-[120px] shrink-0 text-center">分类</div>
        <div class="w-[90px] shrink-0 text-center">日期</div>
      </div>
      <!-- 虚拟滚动 -->
      <div id="virtual-viewport" class="flex-1 min-h-0 overflow-y-auto">
        <div id="virtual-spacer" style="position:relative;">
          <div id="virtual-content" style="position:absolute;left:0;right:0;"></div>
        </div>
      </div>
    </div>

    <!-- 空状态 -->
    <div id="empty" class="hidden flex-1 flex items-center justify-center">
      <div class="text-center">
        <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-slate-600"></i>
        <p class="text-slate-500 text-lg">暂无数据</p>
        <p class="text-slate-600 text-sm mt-1">运行追踪器开始监控</p>
      </div>
    </div>

    <!-- 加载状态 -->
    <div id="loading" class="flex-1 flex items-center justify-center">
      <div class="text-center">
        <i data-lucide="loader-2" class="w-8 h-8 mx-auto mb-3 text-purple-400 animate-spin"></i>
        <p class="text-slate-400">加载中...</p>
      </div>
    </div>
  </div>

<script>
const ROW_HEIGHT = 56;
const BUFFER = 8;
let flatRows = [];
let allData = null;

async function init() {
  try {
    const res = await fetch("./history.json");
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
    document.getElementById("loading").classList.add("hidden");

    if (!allData.entries || allData.entries.length === 0) {
      document.getElementById("empty").classList.remove("hidden");
      lucide.createIcons();
      return;
    }

    renderStats(allData);
    populateCategories(allData.entries);
    buildFlatList(allData.entries);
    initVirtualScroll();
    setupSearch();
    lucide.createIcons();
  } catch (e) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("empty").classList.remove("hidden");
    lucide.createIcons();
  }
}

function renderStats(data) {
  document.getElementById("stat-total").textContent = data.totalTracked.toLocaleString();
  document.getElementById("stat-today").textContent = data.entries[0]?.count.toLocaleString() || "0";
  document.getElementById("stat-updated").textContent = data.lastUpdated || "—";
  document.getElementById("stat-days").textContent = data.entries.length.toString();
}

function populateCategories(entries) {
  const cats = new Set();
  for (const entry of entries) {
    for (const u of entry.urls) {
      if (u.category) cats.add(u.category);
    }
  }
  const select = document.getElementById("category-filter");
  for (const cat of [...cats].sort()) {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    select.appendChild(opt);
  }
}

function buildFlatList(entries, search = "", category = "") {
  const term = search.toLowerCase().trim();
  flatRows = [];
  let idx = 0;
  for (const entry of entries) {
    let urls = entry.urls;
    if (category) urls = urls.filter(u => u.category === category);
    if (term) urls = urls.filter(u =>
      u.url.toLowerCase().includes(term) ||
      (u.name && u.name.toLowerCase().includes(term)) ||
      (u.description && u.description.toLowerCase().includes(term))
    );
    for (const u of urls) {
      idx++;
      flatRows.push({
        idx,
        url: u.url,
        name: u.name || extractName(u.url),
        description: u.description || "",
        thumbnail: u.thumbnail || "",
        category: u.category,
        date: entry.date,
      });
    }
  }
  const count = flatRows.length;
  document.getElementById("result-count").textContent =
    count > 0 ? `共 ${count.toLocaleString()} 条` : "无匹配结果";
}

function extractName(url) {
  try {
    const segs = new URL(url).pathname.split("/").filter(Boolean);
    if (segs.length >= 2 && /^\d+$/.test(segs[0])) {
      return segs[1].replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
    if (segs.length >= 3 && segs[0].length === 2 && /^\d+$/.test(segs[1])) {
      return segs[2].replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
    const last = segs[segs.length - 1] || url;
    return last.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  } catch { return url; }
}

let viewport, spacer, content;
let lastStart = -1, lastEnd = -1;

function initVirtualScroll() {
  viewport = document.getElementById("virtual-viewport");
  spacer = document.getElementById("virtual-spacer");
  content = document.getElementById("virtual-content");
  spacer.style.height = (flatRows.length * ROW_HEIGHT) + "px";
  viewport.addEventListener("scroll", () => requestAnimationFrame(renderVisible), { passive: true });
  renderVisible();
}

function renderVisible() {
  if (!viewport) return;
  const scrollTop = viewport.scrollTop;
  const viewH = viewport.clientHeight;

  let start = Math.floor(scrollTop / ROW_HEIGHT) - BUFFER;
  let end = Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + BUFFER;
  start = Math.max(0, start);
  end = Math.min(flatRows.length, end);

  if (start === lastStart && end === lastEnd) return;
  lastStart = start;
  lastEnd = end;

  const frag = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    const r = flatRows[i];
    const el = document.createElement("a");
    el.href = r.url;
    el.target = "_blank";
    el.rel = "noopener";
    el.className = "trow flex items-center px-4 transition cursor-pointer no-underline";
    el.style.cssText = `position:absolute;top:${i * ROW_HEIGHT}px;left:0;right:0;height:${ROW_HEIGHT}px;border-bottom:1px solid rgba(255,255,255,0.04);`;

    const thumbHtml = r.thumbnail
      ? `<img src="${r.thumbnail}" class="thumb-img" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="thumb-img flex items-center justify-center text-slate-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>`;

    const desc = r.description
      ? `<span class="text-xs text-slate-500 truncate block leading-tight mt-0.5">${escHtml(r.description.slice(0, 120))}</span>`
      : "";

    const cat = r.category
      ? `<span class="cat-pill text-[11px] px-2 py-0.5 rounded-full truncate max-w-full">${r.category}</span>`
      : `<span class="text-slate-600 text-[11px]">—</span>`;

    el.innerHTML = `
      <div class="w-[50px] shrink-0 text-center text-xs text-slate-600">${r.idx}</div>
      <div class="w-[52px] shrink-0 flex items-center justify-center">${thumbHtml}</div>
      <div class="w-[200px] shrink-0 px-2 min-w-0">
        <span class="text-sm text-slate-200 font-medium truncate block">${escHtml(r.name)}</span>
        <span class="text-[11px] text-slate-500 truncate block">${r.url.replace(/^https?:\/\//, "")}</span>
      </div>
      <div class="flex-1 min-w-0 px-2">${desc}</div>
      <div class="w-[120px] shrink-0 text-center">${cat}</div>
      <div class="w-[90px] shrink-0 text-center text-xs text-slate-500">${r.date}</div>
    `;
    frag.appendChild(el);
  }
  content.innerHTML = "";
  content.appendChild(frag);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function rebuildVirtualScroll() {
  spacer.style.height = (flatRows.length * ROW_HEIGHT) + "px";
  viewport.scrollTop = 0;
  lastStart = -1;
  lastEnd = -1;
  renderVisible();
}

function setupSearch() {
  const searchInput = document.getElementById("search");
  const catSelect = document.getElementById("category-filter");
  let debounce;

  function doFilter() {
    buildFlatList(allData.entries, searchInput.value, catSelect.value);
    rebuildVirtualScroll();
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(doFilter, 150);
  });
  catSelect.addEventListener("change", doFilter);
}

init();
</script>
</body>
</html>
