<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap 新增追踪器</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; font-size: 14px; }
    .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
    .trow:hover { background: rgba(255,255,255,0.05); }
    .cat-pill { background: rgba(139,92,246,0.18); color: #c4b5fd; }
    .thumb-img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; background: rgba(255,255,255,0.05); }
    .tab-btn { transition: all 0.2s; cursor: pointer; }
    .tab-btn.active { background: rgba(139,92,246,0.3); color: #e9d5ff; border-color: rgba(139,92,246,0.5); }
    .tab-btn:not(.active) { background: rgba(255,255,255,0.04); color: #94a3b8; border-color: rgba(255,255,255,0.1); }
    .act-btn { transition: all 0.15s; display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-decoration: none; }
    .act-btn:hover { background: rgba(139,92,246,0.25); }
    .act-btn.done { background: rgba(34,197,94,0.15); color: #86efac; border-color: rgba(34,197,94,0.3); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body class="h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 text-white flex flex-col">
<div class="max-w-7xl w-full mx-auto px-4 pt-5 pb-3 flex flex-col h-screen overflow-hidden">

  <!-- 头部 -->
  <header class="text-center mb-3 shrink-0">
    <div class="inline-flex items-center gap-2 mb-1">
      <i data-lucide="radar" class="w-7 h-7 text-purple-400"></i>
      <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Sitemap 新增追踪器</h1>
    </div>
    <p class="text-slate-400 text-sm">每日监控 theporndude.com 新增站点</p>
  </header>

  <!-- 页面切换 Tab -->
  <div class="flex gap-2 mb-3 shrink-0">
    <button id="page-tracker" class="tab-btn active px-4 py-2 text-[13px] font-medium rounded-lg border border-white/10">
      <span class="inline-flex items-center gap-1.5"><i data-lucide="activity" class="w-4 h-4"></i>新增追踪</span>
    </button>
    <button id="page-catalog" class="tab-btn px-4 py-2 text-[13px] font-medium rounded-lg border border-white/10">
      <span class="inline-flex items-center gap-1.5"><i data-lucide="layout-grid" class="w-4 h-4"></i>站点目录</span>
    </button>
  </div>

  <!-- ========== 追踪页面 ========== -->
  <div id="view-tracker" class="flex-1 min-h-0 flex flex-col overflow-hidden">
    <!-- 统计栏 -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3 shrink-0">
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="database" class="w-4 h-4 mx-auto mb-0.5 text-blue-400"></i>
        <div id="stat-total" class="text-lg font-bold">—</div>
        <div class="text-[12px] text-slate-400">累计追踪</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="sparkles" class="w-4 h-4 mx-auto mb-0.5 text-green-400"></i>
        <div id="stat-today" class="text-lg font-bold">—</div>
        <div class="text-[12px] text-slate-400">最近新增</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="calendar" class="w-4 h-4 mx-auto mb-0.5 text-amber-400"></i>
        <div id="stat-updated" class="text-lg font-bold text-sm leading-7">—</div>
        <div class="text-[12px] text-slate-400">最后更新</div>
      </div>
      <div class="glass rounded-xl p-2.5 text-center">
        <i data-lucide="layers" class="w-4 h-4 mx-auto mb-0.5 text-purple-400"></i>
        <div id="stat-days" class="text-lg font-bold">—</div>
        <div class="text-[12px] text-slate-400">追踪天数</div>
      </div>
    </div>
    <!-- 搜索筛选 -->
    <div class="glass rounded-xl p-2.5 mb-3 flex flex-col sm:flex-row gap-2 shrink-0">
      <div class="flex rounded-lg overflow-hidden border border-white/10 shrink-0">
        <button id="btn-today" class="tab-btn active px-3 py-2 text-[13px] font-medium border-r border-white/10">今日新增</button>
        <button id="btn-all" class="tab-btn px-3 py-2 text-[13px] font-medium">全部数据</button>
      </div>
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input id="search" type="text" placeholder="搜索站点名称或 URL..."
          class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition">
      </div>
      <select id="category-filter"
        class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500/50 transition cursor-pointer min-w-[130px]">
        <option value="">全部分类</option>
      </select>
      <div id="result-count" class="text-[12px] text-slate-500 self-center px-2 whitespace-nowrap"></div>
    </div>
    <!-- 表格 -->
    <div class="flex-1 min-h-0 flex flex-col glass rounded-xl overflow-hidden">
      <div class="shrink-0 flex items-center px-4 py-2 text-[12px] font-medium text-slate-400 uppercase tracking-wider border-b border-white/8 bg-white/3">
        <div class="w-[44px] shrink-0 text-center">#</div>
        <div class="w-[48px] shrink-0"></div>
        <div class="w-[200px] shrink-0">站点名称</div>
        <div class="flex-1 min-w-0">简介</div>
        <div class="w-[120px] shrink-0 text-center">分类</div>
        <div class="w-[80px] shrink-0 text-center">日期</div>
      </div>
      <div id="tracker-viewport" class="flex-1 min-h-0 overflow-y-auto">
        <div id="tracker-spacer" style="position:relative;">
          <div id="tracker-content" style="position:absolute;left:0;right:0;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 站点目录页面 ========== -->
  <div id="view-catalog" class="flex-1 min-h-0 flex flex-col overflow-hidden hidden">
    <!-- 搜索 + 分类筛选 -->
    <div class="glass rounded-xl p-2.5 mb-3 flex flex-col sm:flex-row gap-2 shrink-0">
      <div class="relative flex-1">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input id="cat-search" type="text" placeholder="搜索站点..."
          class="w-full bg-white/5 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition">
      </div>
      <select id="cat-category"
        class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500/50 transition cursor-pointer min-w-[160px]">
        <option value="">全部分类</option>
      </select>
      <div id="cat-count" class="text-[12px] text-slate-500 self-center px-2 whitespace-nowrap"></div>
    </div>
    <!-- 表格 -->
    <div class="flex-1 min-h-0 flex flex-col glass rounded-xl overflow-hidden">
      <div class="shrink-0 flex items-center px-4 py-2 text-[12px] font-medium text-slate-400 uppercase tracking-wider border-b border-white/8 bg-white/3">
        <div class="w-[44px] shrink-0 text-center">#</div>
        <div class="w-[180px] shrink-0">英文名</div>
        <div class="w-[180px] shrink-0">中文名</div>
        <div class="w-[140px] shrink-0 text-center">分类</div>
        <div class="flex-1 min-w-0">网站地址</div>
        <div class="w-[120px] shrink-0 text-center">操作</div>
      </div>
      <div id="catalog-viewport" class="flex-1 min-h-0 overflow-y-auto">
        <div id="catalog-spacer" style="position:relative;">
          <div id="catalog-content" style="position:absolute;left:0;right:0;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 加载 -->
  <div id="loading" class="flex-1 flex items-center justify-center">
    <div class="text-center">
      <i data-lucide="loader-2" class="w-8 h-8 mx-auto mb-3 text-purple-400 animate-spin"></i>
      <p class="text-slate-400">加载中...</p>
    </div>
  </div>
</div>

<script>
const ROW_H = 48;
const BUF = 8;

// ===== Tracker =====
let trackerData = null, trackerRows = [], viewMode = "today";
let tVp, tSp, tCt, tS = -1, tE = -1;

// ===== Catalog =====
let catalogData = null, catalogRows = [];
let cVp, cSp, cCt, cS = -1, cE = -1;

async function init() {
  const [hRes, sRes] = await Promise.all([
    fetch("./history.json").then(r => r.ok ? r.json() : null).catch(() => null),
    fetch("./sites.json").then(r => r.ok ? r.json() : null).catch(() => null),
  ]);
  document.getElementById("loading").classList.add("hidden");

  trackerData = hRes;
  catalogData = sRes;

  // Tracker init
  if (trackerData?.entries?.length) {
    renderStats(trackerData);
    populateTrackerCats(trackerData.entries);
    buildTrackerRows();
    tVp = document.getElementById("tracker-viewport");
    tSp = document.getElementById("tracker-spacer");
    tCt = document.getElementById("tracker-content");
    tSp.style.height = (trackerRows.length * ROW_H) + "px";
    tVp.addEventListener("scroll", () => requestAnimationFrame(renderTracker), { passive: true });
    renderTracker();
  }

  // Catalog init
  if (catalogData?.length) {
    populateCatalogCats(catalogData);
    buildCatalogRows();
    cVp = document.getElementById("catalog-viewport");
    cSp = document.getElementById("catalog-spacer");
    cCt = document.getElementById("catalog-content");
    cSp.style.height = (catalogRows.length * ROW_H) + "px";
    cVp.addEventListener("scroll", () => requestAnimationFrame(renderCatalog), { passive: true });
    renderCatalog();
  }

  setupPageTabs();
  setupTrackerControls();
  setupCatalogControls();
  lucide.createIcons();
}

// ===== Page Tabs =====
function setupPageTabs() {
  const btnT = document.getElementById("page-tracker");
  const btnC = document.getElementById("page-catalog");
  const viewT = document.getElementById("view-tracker");
  const viewC = document.getElementById("view-catalog");
  btnT.addEventListener("click", () => {
    btnT.classList.add("active"); btnC.classList.remove("active");
    viewT.classList.remove("hidden"); viewC.classList.add("hidden");
  });
  btnC.addEventListener("click", () => {
    btnC.classList.add("active"); btnT.classList.remove("active");
    viewC.classList.remove("hidden"); viewT.classList.add("hidden");
    if (cVp) { cS = -1; cE = -1; renderCatalog(); }
  });
}

// ===== Tracker Logic =====
function renderStats(d) {
  document.getElementById("stat-total").textContent = d.totalTracked.toLocaleString();
  document.getElementById("stat-today").textContent = d.entries[0]?.count.toLocaleString() || "0";
  document.getElementById("stat-updated").textContent = d.lastUpdated || "—";
  document.getElementById("stat-days").textContent = d.entries.length.toString();
}

function populateTrackerCats(entries) {
  const cats = new Set();
  for (const e of entries) for (const u of e.urls) if (u.category) cats.add(u.category);
  const sel = document.getElementById("category-filter");
  for (const c of [...cats].sort()) { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); }
}

function buildTrackerRows() {
  const search = (document.getElementById("search")?.value || "").toLowerCase().trim();
  const cat = document.getElementById("category-filter")?.value || "";
  const entries = viewMode === "today" && trackerData.entries.length ? [trackerData.entries[0]] : trackerData.entries;
  trackerRows = [];
  let idx = 0;
  for (const e of entries) {
    let urls = e.urls;
    if (cat) urls = urls.filter(u => u.category === cat);
    if (search) urls = urls.filter(u => u.url.toLowerCase().includes(search) || (u.name||"").toLowerCase().includes(search) || (u.description||"").toLowerCase().includes(search));
    for (const u of urls) { idx++; trackerRows.push({ idx, ...u, date: e.date }); }
  }
  document.getElementById("result-count").textContent = trackerRows.length > 0 ? `共 ${trackerRows.length.toLocaleString()} 条` : "无匹配";
}

function renderTracker() {
  if (!tVp) return;
  let s = Math.max(0, Math.floor(tVp.scrollTop / ROW_H) - BUF);
  let e = Math.min(trackerRows.length, Math.ceil((tVp.scrollTop + tVp.clientHeight) / ROW_H) + BUF);
  if (s === tS && e === tE) return;
  tS = s; tE = e;
  const f = document.createDocumentFragment();
  for (let i = s; i < e; i++) {
    const r = trackerRows[i];
    const el = document.createElement("a");
    el.href = r.url; el.target = "_blank"; el.rel = "noopener";
    el.className = "trow flex items-center px-4 transition cursor-pointer no-underline";
    el.style.cssText = `position:absolute;top:${i*ROW_H}px;left:0;right:0;height:${ROW_H}px;border-bottom:1px solid rgba(255,255,255,0.04);`;
    const th = r.thumbnail ? `<img src="${r.thumbnail}" class="thumb-img" loading="lazy" onerror="this.style.display='none'">` : `<div class="thumb-img flex items-center justify-center text-slate-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>`;
    const desc = r.description ? `<span class="text-[12px] text-slate-500 truncate block mt-0.5">${esc(r.description.slice(0,120))}</span>` : "";
    const cat = r.category ? `<span class="cat-pill text-[12px] px-2 py-0.5 rounded-full truncate">${r.category}</span>` : `<span class="text-slate-600 text-[12px]">—</span>`;
    el.innerHTML = `<div class="w-[44px] shrink-0 text-center text-[12px] text-slate-600">${r.idx}</div><div class="w-[48px] shrink-0 flex items-center justify-center">${th}</div><div class="w-[200px] shrink-0 px-2 min-w-0"><span class="text-[13px] text-slate-200 font-medium truncate block">${esc(r.name||extractName(r.url))}</span><span class="text-[12px] text-slate-500 truncate block">${r.url.replace(/^https?:\/\//,"")}</span></div><div class="flex-1 min-w-0 px-2">${desc}</div><div class="w-[120px] shrink-0 text-center">${cat}</div><div class="w-[80px] shrink-0 text-center text-[12px] text-slate-500">${r.date}</div>`;
    f.appendChild(el);
  }
  tCt.innerHTML = ""; tCt.appendChild(f);
}

function rebuildTracker() {
  buildTrackerRows();
  tSp.style.height = (trackerRows.length * ROW_H) + "px";
  tVp.scrollTop = 0; tS = -1; tE = -1; renderTracker();
}

function setupTrackerControls() {
  const btnT = document.getElementById("btn-today"), btnA = document.getElementById("btn-all");
  btnT.addEventListener("click", () => { if (viewMode==="today") return; viewMode="today"; btnT.classList.add("active"); btnA.classList.remove("active"); rebuildTracker(); });
  btnA.addEventListener("click", () => { if (viewMode==="all") return; viewMode="all"; btnA.classList.add("active"); btnT.classList.remove("active"); rebuildTracker(); });
  let d; const si = document.getElementById("search"), cf = document.getElementById("category-filter");
  si.addEventListener("input", () => { clearTimeout(d); d = setTimeout(rebuildTracker, 150); });
  cf.addEventListener("change", rebuildTracker);
}

// ===== Catalog Logic =====
function populateCatalogCats(data) {
  const sel = document.getElementById("cat-category");
  for (const g of data) { const o = document.createElement("option"); o.value = g.slug; o.textContent = g.zhLabel + ` (${g.sites.length})`; sel.appendChild(o); }
}

function buildCatalogRows() {
  const search = (document.getElementById("cat-search")?.value || "").toLowerCase().trim();
  const catSlug = document.getElementById("cat-category")?.value || "";
  catalogRows = [];
  let idx = 0;
  const groups = catSlug ? catalogData.filter(g => g.slug === catSlug) : catalogData;
  const allSites = [];
  for (const g of groups) {
    for (const s of g.sites) {
      if (search && !s.enName.toLowerCase().includes(search) && !s.zhName.toLowerCase().includes(search)) continue;
      allSites.push({ ...s, catLabel: g.zhLabel });
    }
  }
  allSites.reverse();
  for (const s of allSites) { idx++; catalogRows.push({ idx, ...s }); }
  document.getElementById("cat-count").textContent = catalogRows.length > 0 ? `共 ${catalogRows.length.toLocaleString()} 个站点` : "无匹配";
}

function renderCatalog() {
  if (!cVp) return;
  let s = Math.max(0, Math.floor(cVp.scrollTop / ROW_H) - BUF);
  let e = Math.min(catalogRows.length, Math.ceil((cVp.scrollTop + cVp.clientHeight) / ROW_H) + BUF);
  if (s === cS && e === cE) return;
  cS = s; cE = e;
  const f = document.createDocumentFragment();
  for (let i = s; i < e; i++) {
    const r = catalogRows[i];
    const el = document.createElement("div");
    el.className = "trow flex items-center px-4";
    el.style.cssText = `position:absolute;top:${i*ROW_H}px;left:0;right:0;height:${ROW_H}px;border-bottom:1px solid rgba(255,255,255,0.04);`;
    const siteUrl = r.siteUrl ? `<a href="${r.siteUrl}" target="_blank" rel="noopener" class="text-[12px] text-blue-400 hover:text-blue-300 truncate block transition">${r.siteUrl.replace(/^https?:\/\//,"").slice(0,40)}</a>` : `<span class="text-[12px] text-slate-600">—</span>`;
    const nameKey = r.enName;
    const copied = copiedSet.has(nameKey);
    const visited = visitedSet.has(nameKey);
    const semUrl = buildSemUrl(nameKey);
    el.innerHTML = `<div class="w-[44px] shrink-0 text-center text-[12px] text-slate-600">${r.idx}</div><div class="w-[180px] shrink-0 px-2 min-w-0"><span class="text-[13px] text-slate-200 font-medium truncate block">${esc(r.enName)}</span></div><div class="w-[180px] shrink-0 px-2 min-w-0"><span class="text-[13px] text-slate-300 truncate block">${esc(r.zhName)}</span></div><div class="w-[140px] shrink-0 text-center"><span class="cat-pill text-[12px] px-2 py-0.5 rounded-full truncate inline-block max-w-full">${r.catLabel}</span></div><div class="flex-1 min-w-0 px-2">${siteUrl}</div><div class="w-[120px] shrink-0 flex items-center justify-center gap-1"><button onclick="doCopy('${esc(nameKey.replace(/'/g,"\\'"))}', this)" class="act-btn ${copied?'done':''} ${copied?'text-green-400':'text-slate-400'}">${copied?'✓ 已复制':'复制'}</button><a href="${semUrl}" target="_blank" rel="noopener" onclick="doVisit('${esc(nameKey.replace(/'/g,"\\'"))}', this)" class="act-btn ${visited?'done':''} ${visited?'text-green-400':'text-slate-400'}">查询</a></div>`;
    f.appendChild(el);
  }
  cCt.innerHTML = ""; cCt.appendChild(f);
}

function rebuildCatalog() {
  buildCatalogRows();
  cSp.style.height = (catalogRows.length * ROW_H) + "px";
  cVp.scrollTop = 0; cS = -1; cE = -1; renderCatalog();
}

function setupCatalogControls() {
  let d;
  document.getElementById("cat-search").addEventListener("input", () => { clearTimeout(d); d = setTimeout(rebuildCatalog, 150); });
  document.getElementById("cat-category").addEventListener("change", rebuildCatalog);
}

// ===== Utils =====
function esc(s) { return s ? s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }
function extractName(url) { try { const s = new URL(url).pathname.split("/").filter(Boolean); if (s.length>=2&&/^\d+$/.test(s[0])) return s[1].replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase()); return s[s.length-1]||url; } catch { return url; } }

const SEM_BASE = "https://sem.3ue.co/analytics/keywordmagic/?db=us&fid=11223979&filter=H4sIAAAAAAAAA4WOywoCMQxF%2FyXrLkbQzfzKMJTSphrINKUvkcF%2Ft2PFlWBXNyHnnu5gZYtYqJAEzdiQYV5WBTbaERx5T7ZyefR5BwoNU0EHszecUYFETOagYT4raIYr9jQ9OxpvyWQcNSNrCparQ81ypS6YFCTMvTyPq4wpao%2Bm1L7%2B7fsYlvUwNOG64d%2BPXb7YaervIO%2BSXNZWaijvshc6EhmkCQEAAA%3D%3D&__gmitm=ayWzA3*l4EVcTpZei43sW*qRvljSdU&q=";
function buildSemUrl(name) { return SEM_BASE + encodeURIComponent(name); }

// Persist copied/visited state in localStorage
const copiedSet = new Set(JSON.parse(localStorage.getItem("cat_copied") || "[]"));
const visitedSet = new Set(JSON.parse(localStorage.getItem("cat_visited") || "[]"));
function saveSets() {
  localStorage.setItem("cat_copied", JSON.stringify([...copiedSet]));
  localStorage.setItem("cat_visited", JSON.stringify([...visitedSet]));
}

window.doCopy = function(name, btn) {
  navigator.clipboard.writeText(name).then(() => {
    copiedSet.add(name); saveSets();
    btn.textContent = "✓ 已复制"; btn.classList.add("done"); btn.classList.remove("text-slate-400"); btn.classList.add("text-green-400");
  });
};

window.doVisit = function(name, el) {
  visitedSet.add(name); saveSets();
  el.classList.add("done"); el.classList.remove("text-slate-400"); el.classList.add("text-green-400");
};

init();
</script>
</body>
</html>
